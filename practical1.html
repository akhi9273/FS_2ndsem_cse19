<!DOCTYPE html>
<html>
<head>
    <title>Vowel or Consonant</title>
</head>
<body>

<h2>Check Vowel or Consonant</h2>

<input type="text" id="charInput" maxlength="1" placeholder="Enter a letter">
<button onclick="checkChar()">Check</button>

<p id="result"></p>

<script>
function checkChar() {
    let ch = document.getElementById("charInput").value.toLowerCase();

    if (ch === "") {
        document.getElementById("result").innerHTML = "Please enter a character";
        return;
    }

    if (ch >= 'a' && ch <= 'z') {
        if (ch === 'a' || ch === 'e' || ch === 'i' || ch === 'o' || ch === 'u') {
            document.getElementById("result").innerHTML = ch + " is a Vowel";
        } else {
            document.getElementById("result").innerHTML = ch + " is a Consonant";
        }
    } else {
        document.getElementById("result").innerHTML = "Please enter a valid alphabet";
    }
}
</script>

</body>
</html>
